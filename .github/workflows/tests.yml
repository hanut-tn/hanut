name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run type-check --workspace @hanut/web

      - name: Run tests
        run: npm run test --workspace @hanut/web
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key

      - name: Build check
        run: npm run build --workspace @hanut/web
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
          SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_SENTRY_DSN: ''
          SENTRY_SUPPRESS_INSTRUMENTATION_FILE_WARNING: '1'

  test-integration:
    name: Integration Tests (RPC + RLS)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.106.0

      - name: Deduplicate migration version prefixes
        run: |
          # supabase start uses leading digits of each filename as the PRIMARY KEY
          # version in schema_migrations. Same-day migrations share an 8-digit prefix
          # causing duplicate key errors. Rename them to YYYYMMDDNNNNNN_name.sql so
          # every version is unique while preserving lexicographic (application) order.
          set -e
          MIGRATIONS_DIR="supabase/migrations"
          declare -A day_count
          for file in "$MIGRATIONS_DIR"/*.sql; do
            name=$(basename "$file")
            day="${name%%_*}"
            day_count[$day]=$(( ${day_count[$day]:-0} + 1 ))
          done
          declare -A day_idx
          for file in $(ls "$MIGRATIONS_DIR"/*.sql | sort); do
            name=$(basename "$file")
            day="${name%%_*}"
            if [ "${day_count[$day]:-1}" -le 1 ]; then continue; fi
            idx=${day_idx[$day]:-0}
            rest="${name#*_}"
            padded=$(printf "%06d" "$idx")
            new_name="${day}${padded}_${rest}"
            if [ "$new_name" != "$name" ]; then
              mv "$MIGRATIONS_DIR/$name" "$MIGRATIONS_DIR/$new_name"
              echo "  $name → $new_name"
            fi
            day_idx[$day]=$(( idx + 1 ))
          done

      - name: Start Supabase
        run: supabase start

      - name: Export Supabase credentials
        run: |
          STATUS_JSON="$(supabase status -o json)"
          API_URL="$(jq -er '.API_URL // .api_url' <<< "$STATUS_JSON")"
          ANON_KEY="$(jq -er '.PUBLISHABLE_KEY // .ANON_KEY // .publishable_key // .anon_key' <<< "$STATUS_JSON")"
          SERVICE_KEY="$(jq -er '.SERVICE_ROLE_KEY // .service_role_key' <<< "$STATUS_JSON")"
          {
            echo "SUPABASE_TEST_URL=$API_URL"
            echo "SUPABASE_TEST_ANON_KEY=$ANON_KEY"
            echo "SUPABASE_TEST_SERVICE_KEY=$SERVICE_KEY"
          } >> "$GITHUB_ENV"

      - name: Run integration tests
        run: npm run test:integration --workspace @hanut/web
